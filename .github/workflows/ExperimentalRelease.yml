name: Experimental Release

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Increment Paclet Version"]
    types:
      - completed
    branches: [main]

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

env:
  RESOURCE_PUBLISHER_TOKEN: ${{ secrets.RESOURCE_PUBLISHER_TOKEN }}
  WOLFRAMSCRIPT_ENTITLEMENTID: ${{ secrets.WOLFRAMSCRIPT_ENTITLEMENTID }}
  WOLFRAM_SYSTEM_ID: Linux-x86-64
  GH_INSTALL_URL: https://github.com/cli/cli/releases/download/v2.33.0/gh_2.33.0_linux_amd64.deb
  GH_INSTALL_SHA256: ea18a92a3e0a2a8edbca8d5ef368829ec8ced37571e0eb9d2c074917b0c5faae
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  WOLFRAMINIT: -lmverbose

jobs:
  Build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    container:
      image: wolframresearch/wolframengine:14.3
      options: --user root

    steps:
    - name: Update Git
      run: |
        apt-get update && apt-get install software-properties-common -y
        add-apt-repository ppa:git-core/ppa -y
        apt-get update && apt-get install git -y
        curl -fsSL ${{ env.GH_INSTALL_URL }} -o gh.deb
        echo "${{ env.GH_INSTALL_SHA256 }}  gh.deb" | sha256sum --check
        dpkg -i gh.deb

    - name: Checkout
      uses: actions/checkout@v4

    - name: Build Paclet
      run: wolframscript -f Scripts/BuildPaclet.wls

    - name: Build MCPB
      run: wolframscript -f Scripts/BuildMCPB.wls

    - name: Rename Paclet File
      run: mv "${{ env.PACLET_PATH }}" "${{ env.PACLET_BUILD_DIR }}/Wolfram__AgentTools.paclet"

    - name: Update Release
      run: |
        git config --global --add safe.directory $(pwd)

        if ! gh release view experimental; then
          gh release create experimental \
            --target="${{ github.ref }}" \
            --repo="${{ github.repository }}" \
            --title="Experimental Release" \
            --notes="This is an experimental release that's always updated with the latest build from the main branch." \
            --prerelease
        fi

        gh release upload experimental \
          "${{ env.PACLET_BUILD_DIR }}/Wolfram__AgentTools.paclet" \
          "${{ env.MCPB_PATH }}" \
          --clobber \
          --repo="${{ github.repository }}"
