name: Release

on:
  workflow_dispatch:
  push:
    branches: [release/paclet]

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  WOLFRAMINIT: -lmverbose

jobs:

  Check:
    name: Check
    runs-on: ubuntu-latest
    timeout-minutes: 30

    container:
      image: wolframresearch/wolframengine:14.3
      options: --user root

    env:
      WOLFRAM_SYSTEM_ID: Linux-x86-64

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Build
      env:
        WOLFRAMSCRIPT_ENTITLEMENTID: ${{ secrets.WOLFRAMSCRIPT_ENTITLEMENTID }}
        RESOURCE_PUBLISHER_TOKEN: ${{ secrets.RESOURCE_PUBLISHER_TOKEN }}
      run: wolframscript -f Scripts/BuildPaclet.wls --check=true

    - name: Build MCPB
      env:
        WOLFRAMSCRIPT_ENTITLEMENTID: ${{ secrets.WOLFRAMSCRIPT_ENTITLEMENTID }}
      run: wolframscript -f Scripts/BuildMCPB.wls

    - name: Test
      env:
        WOLFRAMSCRIPT_ENTITLEMENTID: ${{ secrets.WOLFRAMSCRIPT_ENTITLEMENTID }}
        RESOURCE_PUBLISHER_TOKEN: ${{ secrets.RESOURCE_PUBLISHER_TOKEN }}
      run: wolframscript -f Scripts/TestPaclet.wls

  Release:
    name: Release
    needs: [Check]
    runs-on: ubuntu-latest
    timeout-minutes: 30

    container:
      image: wolframresearch/wolframengine:14.3
      options: --user root

    env:
      WOLFRAM_SYSTEM_ID: Linux-x86-64
      GH_INSTALL_URL: https://github.com/cli/cli/releases/download/v2.33.0/gh_2.33.0_linux_amd64.deb
      GH_INSTALL_SHA256: ea18a92a3e0a2a8edbca8d5ef368829ec8ced37571e0eb9d2c074917b0c5faae

    steps:
    - name: Update Git
      run: |
        apt-get update && apt-get install software-properties-common -y
        add-apt-repository ppa:git-core/ppa -y
        apt-get update && apt-get install git -y
        curl -fsSL ${{ env.GH_INSTALL_URL }} -o gh.deb
        echo "${{ env.GH_INSTALL_SHA256 }}  gh.deb" | sha256sum --check
        dpkg -i gh.deb

    - name: Checkout
      uses: actions/checkout@v4

    - name: Build
      env:
        WOLFRAMSCRIPT_ENTITLEMENTID: ${{ secrets.WOLFRAMSCRIPT_ENTITLEMENTID }}
        RESOURCE_PUBLISHER_TOKEN: ${{ secrets.RESOURCE_PUBLISHER_TOKEN }}
      run: wolframscript -f Scripts/BuildPaclet.wls --check=false

    - name: Build MCPB
      env:
        WOLFRAMSCRIPT_ENTITLEMENTID: ${{ secrets.WOLFRAMSCRIPT_ENTITLEMENTID }}
      run: wolframscript -f Scripts/BuildMCPB.wls

    - name: CreateRelease
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global --add safe.directory $(pwd)
        gh release create "${{ env.PACLET_RELEASE_TAG }}" \
            "${{ env.PACLET_PATH }}#${{ env.PACLET_FILE }}" \
            "${{ env.MCPB_PATH }}#${{ env.MCPB_FILE }}" \
            --target="${{ github.ref }}" \
            --repo="${{ github.repository }}" \
            --title="Release ${{ env.PACLET_RELEASE_TAG }}" \
            --generate-notes \
            --prerelease